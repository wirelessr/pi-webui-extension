<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>pi hub</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    .session-item[draggable="true"] { cursor: grab; }
    .session-item.dragging { opacity: 0.45; cursor: grabbing; }
    .group-header {
      display: flex; align-items: center; gap: 6px;
      padding: 4px 8px; margin-top: 4px;
      font-size: 12px; font-weight: 600; opacity: 0.85;
      cursor: pointer; user-select: none;
    }
    .group-header:hover { opacity: 1; }
    .group-toggle { width: 1em; display: inline-block; }
    .group-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .group-count { opacity: 0.6; font-weight: 400; }
    .group-del { background: none; border: none; color: inherit; cursor: pointer; opacity: 0.5; font-size: 14px; padding: 0 2px; }
    .group-del:hover { opacity: 1; }
    .group-body { padding-left: 10px; border-left: 2px solid rgba(128,128,128,0.25); margin-left: 6px; min-height: 6px; }
    .group.collapsed .group-body { display: none; }
    .group.group-dragging { opacity: 0.45; }
    .ctx-menu {
      position: fixed; z-index: 1000; min-width: 172px; max-width: 260px;
      background: var(--bg-surface, #23232a); color: var(--text, #e0e0e0);
      border: 1px solid var(--border, rgba(128,128,128,0.35));
      border-radius: var(--radius-sm, 6px); padding: 4px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.4); font-size: 13px;
    }
    .ctx-item {
      padding: 6px 10px; border-radius: 4px; cursor: pointer;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .ctx-item:hover { background: var(--bg-surface-hover, rgba(128,128,128,0.2)); }
    .ctx-item.disabled { opacity: 0.5; cursor: default; }
    .ctx-sep { height: 1px; background: var(--border, rgba(128,128,128,0.25)); margin: 4px 2px; }
    #queue-chips { display: flex; flex-wrap: wrap; gap: 6px; padding: 6px 8px 0; }
    #queue-chips.hidden { display: none; }
    .queue-chip {
      display: inline-flex; align-items: center; gap: 6px; max-width: 100%;
      padding: 3px 6px 3px 10px; font-size: 12px;
      background: var(--bg-surface, rgba(128,128,128,0.15));
      border: 1px solid var(--border, rgba(128,128,128,0.3)); border-radius: 999px;
    }
    .queue-chip-text { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 260px; opacity: 0.85; }
    .queue-chip-del { background: none; border: none; color: inherit; cursor: pointer; opacity: 0.6; font-size: 14px; line-height: 1; padding: 0 2px; }
    .queue-chip-del:hover { opacity: 1; }
    .queue-paused {
      display: flex; align-items: center; gap: 10px; width: 100%;
      padding: 4px 8px; font-size: 12px; border-radius: var(--radius-sm, 6px);
      background: color-mix(in srgb, var(--warning, #d08770) 18%, transparent);
      color: var(--warning, #d08770);
    }
    .queue-resume { background: none; border: 1px solid currentColor; color: inherit; cursor: pointer; border-radius: 4px; padding: 1px 8px; font-size: 12px; }
</style>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>hub</text></svg>">
</head>
<body>
  <div id="app" data-active-view="chat">
    <header id="topbar">
      <div class="brand">
        <span class="logo">pi hub</span>
        <span id="session-name" class="session-name"></span>
      </div>
      <div class="status-area">
        <span id="stats-display" class="stats"></span>
        <span id="busy-indicator" class="status idle">idle</span>
        <button id="expand-tools-btn" class="expand-btn" title="Expand all tool/thinking blocks">▼</button>
        <span id="port-display" class="port"></span>
        <span id="pid-display" class="pid"></span>
        <span id="cwd-display" class="cwd" title=""></span>
      </div>
    </header>

    <div id="new-session-modal" class="modal hidden">
      <div class="modal-content">
        <div class="modal-header">New / Open Session</div>
        <input id="session-id-input" class="modal-input" type="text" placeholder="Session ID to resume (empty = new session)" autocomplete="off" />
        <input id="session-cwd-input" class="modal-input" type="text" list="session-cwd-candidates" placeholder="Working directory (empty = inherit current; ignored when resuming)" autocomplete="off" />
        <datalist id="session-cwd-candidates"></datalist>
        <div class="modal-actions">
          <button id="session-modal-cancel" class="ghost-btn">Cancel</button>
          <button id="session-modal-ok" class="send-btn">OK</button>
        </div>
      </div>
    </div>

    <div id="main-layout">
      <aside id="sidebar-left" class="sidebar" data-view="sessions">
        <div class="sidebar-header">
          <span>sessions</span>
          <div class="header-actions">
            <button id="new-session" class="icon-btn" title="New session">+</button>
            <button id="new-group" class="icon-btn" title="New group">&#128193;</button>
            <button id="reload-all" class="icon-btn" title="Reload all sessions">&#10227;</button>
            <button id="refresh-sessions" class="icon-btn" title="Refresh">&#8635;</button>
          </div>
        </div>
        <div id="sessions-list" class="sidebar-list"></div>
      </aside>
      <div id="sidebar-resize" class="resize-handle"></div>

      <main id="chat" class="chat" data-view="chat">
        <div id="messages"></div>
        <div id="scroll-bottom" class="hidden">
          <button class="ghost-btn">scroll to bottom</button>
        </div>
      </main>

      <aside id="sidebar-right" class="sidebar" data-view="commands">
        <div class="sidebar-header">
          <span id="commands-title">commands</span>
          <span id="commands-count" class="count-badge"></span>
        </div>
        <div id="commands-list" class="sidebar-list"></div>
      </aside>
    </div>

    <nav id="mobile-nav">
      <button class="nav-btn active" data-target="sessions"><span class="nav-icon">&#9776;</span><span class="nav-label">sessions</span></button>
      <button class="nav-btn active" data-target="chat"><span class="nav-icon">&#9993;</span><span class="nav-label">chat</span></button>
      <button class="nav-btn active" data-target="commands"><span class="nav-icon">/</span><span class="nav-label">commands</span></button>
    </nav>

    <footer id="input-area">
      <div id="queue-chips" class="hidden"></div>
      <div class="input-row">
        <textarea id="message-input" placeholder="Send a message...  Type / to filter commands" rows="1" autofocus></textarea>
        <button id="send-btn" class="send-btn">Send</button>
      </div>
      <div class="input-hint"><span>Enter to send, Shift+Enter for newline</span></div>
    </footer>
  </div>

  <script src="/qrcode-lib.js"></script>
  <script type="module" src="/hub-app.js"></script>
</body>
</html>
