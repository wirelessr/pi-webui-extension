name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - run: npx biome check packages/

      - name: components — tests + 100% line coverage
        working-directory: packages/components
        run: |
          node --test test/*.test.js
          node --experimental-test-coverage --test test/*.test.js 2>&1 | tee /tmp/cov-components.txt
          for mod in stream-accumulator selection-state flow ui-behaviors api utils sse-parser session-spawn; do
            line=$(grep " $mod.js " /tmp/cov-components.txt || true)
            if [ -z "$line" ]; then echo "ERROR: $mod.js not found in coverage"; exit 1; fi
            pct=$(echo "$line" | awk -F'|' '{print $2}' | awk '{print $1}' | tr -d '.')
            if [ "$pct" != "10000" ]; then echo "ERROR: $mod.js coverage $line"; exit 1; fi
            echo "OK: $mod.js — 100%"
          done

      - name: extension — tests + 100% line coverage
        working-directory: packages/extension
        run: |
          node --test test/*.test.js
          node --experimental-test-coverage --test test/*.test.js 2>&1 | tee /tmp/cov-extension.txt
          for mod in session-helpers name-generator; do
            line=$(grep " $mod.js " /tmp/cov-extension.txt || true)
            if [ -z "$line" ]; then echo "ERROR: $mod.js not found in coverage"; exit 1; fi
            pct=$(echo "$line" | awk -F'|' '{print $2}' | awk '{print $1}' | tr -d '.')
            if [ "$pct" != "10000" ]; then echo "ERROR: $mod.js coverage $line"; exit 1; fi
            echo "OK: $mod.js — 100%"
          done
